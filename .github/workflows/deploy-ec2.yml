name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH and rebuild containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euxo pipefail

            # Ensure Terraform user_data/cloud-init bootstrap is fully finished.
            sudo cloud-init status --wait

            APP_DIR="/opt/marketmind-ai"
            REPO_URL="https://github.com/sarsky123/marketmind-ai.git"
            BRANCH="main"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$USER":"$USER" "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ -n "${{ secrets.APP_ENV_B64 }}" ]; then
              printf '%s' "${{ secrets.APP_ENV_B64 }}" | base64 --decode > .env
            else
              cat > .env <<'EOF'
DB_USER=${{ secrets.DB_USER }}
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
DB_NAME=${{ secrets.DB_NAME }}
DATABASE_URL=${{ secrets.DATABASE_URL }}
REDIS_URL=${{ secrets.REDIS_URL }}
OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}
EOF
            fi
            chmod 600 .env

            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
