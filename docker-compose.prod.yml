services:
  postgres:
    environment:
      POSTGRES_USER: ${DB_USER:?missing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?missing}
      POSTGRES_DB: ${DB_NAME:?missing}
    ports: []

  redis:
    ports: []

  backend:
    build:
      target: prod
    command:
      [
        "gunicorn",
        "-k",
        "uvicorn.workers.UvicornWorker",
        "-w",
        "${GUNICORN_WORKERS:-2}",
        "-t",
        "${GUNICORN_TIMEOUT:-120}",
        "-b",
        "0.0.0.0:8000",
        "main:app",
      ]

  frontend:
    build:
      target: prod

  caddy:
    image: caddy:2-alpine
    depends_on:
      - frontend
      - backend
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?missing}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  caddy-data:
  caddy-config:
